[project]
title = "Working Paper Title"
discipline = "Economics"
paper_type = "Empirical paper"
target_journal = "General-interest field journal"
voice = "Precise, formal, evidence-led"
citation_style = "BibTeX"

[workflow]
max_refinement_rounds = 3
required_reviewers = ["reviewer", "methods-referee", "adversarial-reviewer"]
dangerously_bypass_approvals_and_sandbox = false
latex_root = "manuscript/main.tex"
paper_sections = [
  "abstract",
  "introduction",
  "literature",
  "methods",
  "results",
  "discussion",
  "conclusion",
]
